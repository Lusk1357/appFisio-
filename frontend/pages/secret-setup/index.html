<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-Fisio | Configuração</title>
    <link rel="icon" type="image/png" href="/images/icon-192.png">

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <link rel="stylesheet" href="/style/secret-setup.css" />
    <script src="/script/secret-setup.js" defer></script>
</head>
<body>
    <div id="toast-container"></div>

    <div class="app-container">
        <div class="header">
            <h1>SETUP <span class="highlight-blue">ADMIN</span></h1>
            <p class="subtitle">Crie um novo administrador do sistema</p>
        </div>

        <form id="setupForm">
            <div class="form-group">
                <label for="name">NOME COMPLETO</label>
                <div class="input-wrapper">
                    <input type="text" id="name" required placeholder="Ex: Administrador Geral">
                    <i class="fa-solid fa-user input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="email">E-MAIL (LOGIN)</label>
                <div class="input-wrapper">
                    <input type="email" id="email" required placeholder="admin@clinica.com">
                    <i class="fa-solid fa-envelope input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="password">SENHA</label>
                <div class="input-wrapper">
                    <input type="password" id="password" required placeholder="••••••••">
                    <i class="fa-solid fa-lock input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="masterKey">CHAVE MESTRA</label>
                <div class="input-wrapper">
                    <input type="password" id="masterKey" required placeholder="Chave de segurança">
                    <i class="fa-solid fa-key input-icon"></i>
                </div>
            </div>

            <button type="submit" class="btn-setup">CRIAR ADMIN</button>
        </form>
    </div>
</body>
</html>
