<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editar Perfil - PRO FISIO SIMIONATO</title>

  <link rel="stylesheet" href="/style/perfil/editar_perfil.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="icon" type="image/png" href="/images/icon-192.png">

  <script src="/script/components.js"></script>
  <script src="/script/perfil/editar_perfil.js" defer></script>
</head>

<body>
  <div class="app-container">
    <header class="top-bar">
      <div class="top-bar-content">
        <button class="icon-btn" onclick="history.back()" aria-label="Voltar">
          <i class="fa-solid fa-chevron-left"></i>
        </button>
        <h1>EDITAR PERFIL</h1>
        <div style="width: 24px"></div>
      </div>
    </header>

    <main class="main-content">
      <div class="edit-card">
        <div class="profile-photo-container" id="photoUploadBtn" title="Alterar avatar">
          <img src="" alt="Sua foto" id="profilePreview"
            style="display: none; width: 100%; height: 100%; border-radius: 50%; object-fit: cover; z-index: 2;" />
          <div class="camera-overlay" style="z-index: 3;">
            <i class="fa-solid fa-camera"></i>
          </div>
        </div>

        <form id="editProfileForm">
          <div class="form-group">
            <label>Nome completo</label>
            <div class="input-wrapper">
              <input type="text" id="inputName" required />
              <i class="fa-solid fa-check icon-right"></i>
            </div>
          </div>

          <div class="form-group">
            <label>Telefone</label>
            <div class="input-wrapper">
              <input type="tel" id="inputPhone" />
            </div>
          </div>

          <div class="form-group">
            <label>E-mail</label>
            <div class="input-wrapper">
              <input type="email" id="inputEmail" required disabled title="O E-mail não pode ser alterado por aqui."
                style="background-color: #f3f4f6; color: #9ca3af;" />
            </div>
          </div>

          <div class="form-group">
            <label>Peso</label>
            <div class="input-wrapper split-wrapper">
              <input type="number" id="inputWeight" step="0.1" />
              <div class="unit-toggle" data-target="weight">
                <button type="button" class="unit-btn">LBS</button>
                <button type="button" class="unit-btn active">KG</button>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>Altura</label>
            <div class="input-wrapper split-wrapper">
              <input type="number" id="inputHeight" />
              <div class="unit-toggle" data-target="height">
                <button type="button" class="unit-btn">PÉS</button>
                <button type="button" class="unit-btn active">CM</button>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>Gênero</label>
            <div class="input-wrapper select-wrapper">
              <i class="fa-solid fa-mars icon-left" id="genderIcon"></i>
              <select id="genderSelect">
                <option value="" disabled selected>Selecione...</option>
                <option value="Masculino">Masculino</option>
                <option value="Feminino">Feminino</option>
                <option value="Outro">Outro</option>
              </select>
              <i class="fa-solid fa-chevron-down icon-arrow"></i>
            </div>
          </div>

          <div class="form-group">
            <label>Idade</label>
            <div class="input-wrapper">
              <input type="number" id="inputAge" />
            </div>
          </div>

          <button type="submit" class="btn-save" id="saveBtn">SALVAR</button>
        </form>
      </div>
    </main>

    <!-- Bottom Navigation Componentized -->
  </div>

  <!-- Modal de Seleção de Avatar -->
  <div class="avatar-modal-overlay" id="avatarModal" style="display: none;">
    <div class="avatar-modal-content">
      <div class="modal-header">
        <h3>Escolha seu Avatar</h3>
        <button class="close-modal-btn" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="avatar-grid" id="avatarGrid">
        <!-- Populado via JS -->
      </div>
    </div>
  </div>
</body>

</html>
