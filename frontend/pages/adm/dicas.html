<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dicas e Vídeos - PRO FISIO SIMIONATO Admin</title>

    <link rel="stylesheet" href="/style/adm/dicas.css" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <!-- PWA Setup -->
    <link rel="icon" type="image/png" href="/images/icon-192.png">
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="/script/authGuard.js"></script>
    <script>verificarAcesso("ADMIN");</script>
    <script src="/script/components.js"></script>
    <style>
        /* Botão Flutuante */
        .btn-floating-bottom {
            position: fixed;
            bottom: 30px;
            right: 24px;
            width: 56px;
            height: 56px;
            background-color: #5b8af5 !important;
            color: #fff !important;
            border: none;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(91, 138, 245, 0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            z-index: 2000;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
            border: 2px solid rgba(255, 255, 255, 0.2);
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0) !important;
            user-select: none !important;
            outline: none !important;
            touch-action: manipulation;
        }

        @media (hover: hover) and (pointer: fine) {
            .btn-floating-bottom:hover {
                background-color: #1a1a2e !important;
                transform: translateY(-5px);
                box-shadow: 0 8px 25px rgba(26, 26, 46, 0.3);
            }
        }

        /* Garante que em touch o botão NUNCA mude de cor no foco ou hover */
        @media (hover: none) {
            .btn-floating-bottom:hover,
            .btn-floating-bottom:active,
            .btn-floating-bottom:focus {
                background-color: #5b8af5 !important;
            }
        }

        .btn-floating-bottom:focus,
        .btn-floating-bottom:focus-visible {
            outline: none !important;
            background-color: #5b8af5 !important;
        }

        .btn-floating-bottom:active {
            transform: scale(0.92);
            transition: transform 0.05s;
        }

        .btn-floating-bottom i {
            filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.1));
            transition: transform 0.4s ease;
            pointer-events: none;
        }

        .btn-floating-bottom.is-up i {
            transform: rotate(180deg);
        }
    </style>
</head>


<body>
    <div class="app-wrapper">

        <!-- Header -->
        <header class="page-header">
            <button class="btn-back" onclick="history.back()">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <span class="header-title">Tela ADM</span>
            <button class="btn-back" onclick="window.location.href='/pages/adm/home_adm.html'" title="Página Inicial">
                <i class="fa-solid fa-house"></i>
            </button>
        </header>

        <!-- Título + controles -->
        <div class="section-top">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <h1 class="section-title" style="margin-bottom: 0;">DICAS E VÍDEOS</h1>
                <button class="btn-primary-small" id="btnOpenModal">
                    <i class="fa-solid fa-plus"></i> Novo
                </button>
            </div>
            <p style="color: #6b7280; font-size: 14px; line-height: 1.4;">
                Gerencie os vídeos e dicas que aparecem na tela inicial dos pacientes.
            </p>
        </div>

        <!-- Grade de Dicas -->
        <main class="tips-container">
            <div class="tips-grid" id="tipsGrid">
                <p style="text-align:center; margin-top: 20px; color:#6b7280">Carregando dicas...</p>
            </div>
        </main>

    </div>

    <!-- Modal Adicionar -->
    <div class="modal-overlay" id="tipModal">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px; font-weight: 700;">Nova Dica/Vídeo</h2>
            <form id="tipForm">
                <input type="hidden" id="tipId" />
                <div class="form-group">
                    <label>Título da Dica</label>
                    <input type="text" id="tipTitle" required placeholder="Ex: Exercícios para lombar" />
                </div>
                <div class="form-group">
                    <label>Duração (Texto)</label>
                    <input type="text" id="tipDuration" required placeholder="Ex: 10 min" />
                </div>
                <div class="form-group">
                    <label>Link da Imagem (Thumbnail)</label>
                    <input type="url" id="tipThumb" required placeholder="https://..." />
                </div>
                <div class="form-group">
                    <label>Link do Vídeo (Youtube/Opcional)</label>
                    <input type="url" id="tipLink" placeholder="https://youtube.com/..." />
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" id="btnCancelModal">Cancelar</button>
                    <button type="submit" class="btn-save">Salvar Dica</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Botão Flutuante -->
    <button id="scrollToBottomBtn" class="btn-floating-bottom" onclick="toggleScroll()" aria-label="Rolar para baixo">
        <i class="fas fa-chevron-down"></i>
    </button>

    <script src="/script/adm/dicas.js"></script>
    <script>
        function toggleScroll() {
            const btn = document.getElementById('scrollToBottomBtn');
            setTimeout(() => btn.blur(), 50);

            const isBottom = (window.innerHeight + window.scrollY) >= (document.documentElement.scrollHeight - 100);
            if (isBottom) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'smooth' });
            }
        }

        window.addEventListener('scroll', () => {
            const btn = document.getElementById('scrollToBottomBtn');
            const isBottom = (window.innerHeight + window.scrollY) >= (document.documentElement.scrollHeight - 100);
            
            if (isBottom) {
                btn.classList.add('is-up');
            } else {
                btn.classList.remove('is-up');
            }
        });
    </script>
</body>


</html>
