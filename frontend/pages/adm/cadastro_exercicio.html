<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastrar Exercício - PRO FISIO SIMIONATO</title>

    <link rel="stylesheet" href="/style/adm/cadastro_adm.css" />
    <script src="/script/authGuard.js"></script>
    <script>verificarAcesso("ADMIN");</script>
    <script src="/script/components.js" defer></script>
    <script src="/script/adm/cadastro_exercicio.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <!-- PWA Setup -->
    <link rel="icon" type="image/png" href="/images/icon-192.png">
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
    <div class="app-wrapper">
        <header class="page-header">
            <button onclick="back()" class="btn-back" aria-label="Voltar">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <h1>CADASTRAR EXERCÍCIO</h1>
            <p class="subtitle">
                Insira as informações do novo exercício
            </p>
        </header>

        <form>
            <div class="form-group">
                <label for="nome">Nome do Exercício</label>
                <div class="input-wrapper">
                    <input type="text" id="nome" placeholder="Ex: Alongamento de Panturrilha" />
                    <i class="fa-solid fa-dumbbell input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="categoria">Categoria</label>
                <div class="custom-select-container" id="categorySelectContainer">
                    <div class="input-wrapper select-trigger" id="categoryTrigger">
                        <span id="selectedCategoryText" class="placeholder">Selecione a categoria...</span>
                        <i class="fa-solid fa-chevron-down arrow"></i>
                    </div>
                    <div class="select-dropdown" id="categoryDropdown">
                        <div class="select-option" data-value="Cervical / Pescoço">Cervical / Pescoço</div>
                        <div class="select-option" data-value="Ombro / Braço">Ombro / Braço</div>
                        <div class="select-option" data-value="Cotovelo / Antebraço">Cotovelo / Antebraço</div>
                        <div class="select-option" data-value="Punho / Mão">Punho / Mão</div>
                        <div class="select-option" data-value="Coluna Lombar">Coluna Lombar</div>
                        <div class="select-option" data-value="Coluna Torácica">Coluna Torácica</div>
                        <div class="select-option" data-value="Core / Abdômen">Core / Abdômen</div>
                        <div class="select-option" data-value="Quadril / Coxa">Quadril / Coxa</div>
                        <div class="select-option" data-value="Joelho / Perna">Joelho / Perna</div>
                        <div class="select-option" data-value="Tornozelo / Pé">Tornozelo / Pé</div>
                        <div class="select-option" data-value="Respiratório">Respiratório</div>
                        <div class="select-option" data-value="Geral / Funcional">Geral / Funcional</div>
                    </div>
                    <!-- Hidden input to keep compatibility with existing JS if needed, or we just use a variable -->
                    <input type="hidden" id="categoria" name="categoria" value="">
                </div>
            </div>

            <div class="form-group">
                <label for="duration">Duração Estimada (Minutos)</label>
                <div class="input-wrapper">
                    <input type="number" id="duration" placeholder="Ex: 5" min="0" />
                    <i class="fa-solid fa-clock input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="comoExecutar">Como Executar</label>
                <div class="input-wrapper textarea-wrapper">
                    <textarea id="comoExecutar" rows="4" placeholder="Descreva o passo a passo de como realizar o exercício..."></textarea>
                    <i class="fa-solid fa-clipboard-list input-icon" style="top:18px;"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="equipamentos">Equipamentos (Opcional)</label>
                <div class="input-wrapper">
                    <input type="text" id="equipamentos" placeholder="Ex: Halteres, Faixa Elástica" />
                    <i class="fa-solid fa-box-open input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="observacao">Observação (Opcional)</label>
                <div class="input-wrapper">
                    <input type="text" id="observacao" placeholder="Ex: Mantenha a coluna reta..." />
                    <i class="fa-solid fa-comment-medical input-icon"></i>
                </div>
            </div>

            <!-- Imagem — Modo duplo -->
            <div class="form-group">
                <label>Imagem do Exercício (Opcional)</label>
                <div class="image-mode-toggle">
                    <button type="button" class="toggle-btn active" data-mode="local" id="btnModoLocal">
                        <i class="fa-solid fa-folder-open"></i> Imagem Local
                    </button>
                    <button type="button" class="toggle-btn" data-mode="url" id="btnModoUrl">
                        <i class="fa-solid fa-link"></i> URL Externa
                    </button>
                </div>
                <!-- Modo Local -->
                <div class="input-wrapper" id="imagemLocalWrapper">
                    <select id="imagemLocalSelect">
                        <option value="" disabled selected>Carregando imagens...</option>
                    </select>
                    <i class="fa-solid fa-image input-icon"></i>
                </div>
                <!-- Modo URL -->
                <div class="input-wrapper" id="imagemUrlWrapper" style="display:none;">
                    <input type="text" id="imageUrl" placeholder="Ex: https://exemplo.com/imagem.png" />
                    <i class="fa-solid fa-link input-icon"></i>
                </div>
                <!-- Preview -->
                <div id="imagePreview" style="margin-top:8px; display:none; text-align:center;">
                    <img id="imgPreviewTag" src="" alt="Prévia" style="max-height:100px; border-radius:10px; border:1px solid #e2e8f0;" />
                </div>
            </div>

            <div class="form-group">
                <label for="videoLink">Link do Vídeo (Opcional)</label>
                <div class="input-wrapper">
                    <input type="url" id="videoLink" placeholder="Ex: https://youtube.com/..." />
                    <i class="fa-solid fa-video input-icon"></i>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="btn-cadastrar">CADASTRAR EXERCÍCIO</button>
        </form>
    </div>
</body>

</html>
