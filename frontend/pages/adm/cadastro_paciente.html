<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastrar Paciente - Pro Fisio</title>

    <link rel="stylesheet" href="/style/adm/cadastro_adm.css" />
    <style>
        .form-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 0; }
        .flex-1 { flex: 1; min-width: 250px; }
        .form-select {
            width: 100%; border: none; background: transparent; height: 50px;
            padding: 0 10px 0 45px; font-family: 'DM Sans', sans-serif; font-size: 14px;
            color: #1e293b; outline: none; appearance: none; cursor: pointer;
        }
    </style>
    <script src="/script/authGuard.js"></script>
    <script>verificarAcesso("ADMIN");</script>
    <script src="/script/components.js" defer></script>
    <script src="/script/adm/cadastro_paciente.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <!-- PWA Setup -->
    <link rel="icon" type="image/png" href="/images/icon-192.png">
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
    <div class="app-wrapper">
        <header class="page-header">
            <button onclick="back()" class="btn-back" aria-label="Voltar">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <h1>CADASTRAR PACIENTE</h1>
            <p class="subtitle">
                Insira as informações do novo paciente
            </p>
        </header>

        <form>
            <div class="form-row">
                <div class="form-group flex-1">
                    <label for="name">Nome Completo</label>
                    <div class="input-wrapper">
                        <input type="text" id="name" placeholder="Nome completo" />
                        <i class="fa-solid fa-user input-icon"></i>
                    </div>
                </div>

                <div class="form-group flex-1">
                    <label for="tel">Telefone (DDD + Número)</label>
                    <div class="input-wrapper">
                        <input type="tel" id="tel" placeholder="(00) 00000-0000" />
                        <i class="fa-solid fa-phone input-icon"></i>
                    </div>
                </div>
            </div>



            <div class="form-row">
                <div class="form-group flex-1">
                    <label for="email">Login de Acesso</label>
                    <div class="input-wrapper">
                        <input type="text" id="email" placeholder="Login desejado" />
                        <button type="button" id="btn-gerar" title="Gerar automático"
                            style="background:transparent; border:none; color:#5b8af5; cursor:pointer; font-weight:700; font-family:'DM Sans', sans-serif; font-size:11px; margin-right:10px; padding: 4px;">GERAR</button>
                        <i class="fa-solid fa-user-lock input-icon"></i>
                    </div>
                </div>

                <div class="form-group flex-1">
                    <label for="password">Senha Inicial</label>
                    <div class="input-wrapper">
                        <input type="text" id="password" placeholder="Senha do paciente" />
                        <i class="fa-solid fa-key input-icon"></i>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="btn-cadastrar" style="margin-top: 20px;">CADASTRAR PACIENTE</button>
        </form>
    </div>
</body>

</html>
