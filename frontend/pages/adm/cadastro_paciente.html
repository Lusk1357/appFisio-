<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastrar Paciente - Pro Fisio</title>

    <link rel="stylesheet" href="/style/adm/cadastro_adm.css" />
    <script src="/script/authGuard.js"></script>
    <script>verificarAcesso("ADMIN");</script>
    <script src="/script/adm/cadastro_paciente.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
    <div class="app-wrapper">
        <header class="page-header">
            <button onclick="back()" class="btn-back" aria-label="Voltar">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <h1>CADASTRAR PACIENTE</h1>
            <p class="subtitle">
                Insira as informações do novo paciente
            </p>
        </header>

        <form>
            <div class="form-group">
                <label for="name">Nome Completo</label>
                <div class="input-wrapper">
                    <input type="text" id="name" placeholder="Insira seu nome completo" />
                    <i class="fa-solid fa-user input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="tel">Telefone</label>
                <div class="input-wrapper">
                    <input type="tel" id="tel" placeholder="Insira seu número de celular" />
                    <i class="fa-solid fa-phone input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Login</label>
                <div class="input-wrapper">
                    <input type="text" id="email" placeholder="Insira o login ou gere automático" />
                    <button type="button" id="btn-gerar" title="Gerar Login e Senha"
                        style="background:transparent; border:none; color:#5b8af5; cursor:pointer; font-weight:700; font-family:'DM Sans', sans-serif; font-size:12px; margin-right:10px; padding: 4px;">GERAR</button>
                    <i class="fa-solid fa-user-lock input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Senha Inicial</label>
                <div class="input-wrapper">
                    <input type="text" id="password" placeholder="Insira ou gere uma senha" />
                    <i class="fa-solid fa-key input-icon"></i>
                </div>
            </div>

            <button type="button" class="btn-submit" id="btn-cadastrar">CADASTRAR</button>
        </form>
    </div>
</body>

</html>
