<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editar Perfil - Pro Fisio</title>

  <link rel="stylesheet" href="/style/adm/editar_perfil_paciente.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap"
    rel="stylesheet" />
  <!-- PWA Setup -->
  <link rel="icon" type="image/png" href="/images/icon-192.png">
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    .row-group { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 0px; }
    .flex-1 { flex: 1; min-width: 140px; }
    .edit-select {
        width: 100%; border: none; background: transparent; height: 100%;
        padding: 0 10px; font-family: 'DM Sans', sans-serif; font-size: 14px;
        color: #1e293b; outline: none; appearance: none; cursor: pointer;
    }
    .edit-form .form-group { margin-bottom: 12px; }
  </style>

  <script src="/script/components.js" defer></script>
  <script src="/script/adm/editar_perfil_paciente.js" defer></script>
</head>

<body>
  <div class="app-wrapper">

    <header class="page-header">
      <button class="btn-back" onclick="history.back()" title="Voltar">
        <i class="fa-solid fa-chevron-left"></i>
      </button>
      <div class="header-title-group">
        <h1>EDITAR PERFIL</h1>
        <p class="subtitle">Gerencie as informações do paciente</p>
      </div>
    </header>

    <div class="form-content">
      <!-- Avatar + Nome -->
      <section class="profile-hero">
        <div class="avatar-wrapper">
          <div class="avatar-placeholder" id="avatarDisplay">
            <i class="fa-solid fa-user" style="font-size: 40px; color: #5b8af5;"></i>
          </div>
        </div>
        <div class="name-edit-row">
          <h1 class="patient-name" id="patientName">—</h1>
          <div class="btn-edit-wrapper">
            <button class="btn-edit-name" id="btnEditName">
              <i class="fa-solid fa-pen"></i>
            </button>
            <span class="edit-tooltip">Editar perfil</span>
          </div>
        </div>
      </section>

      <!-- Formulário -->
      <form class="edit-form" id="editForm">

        <div class="row-group">
          <div class="form-group flex-1">
            <label>Nome:</label>
            <div class="input-wrapper">
              <input type="text" id="fieldNome" placeholder="Nome completo" />
            </div>
          </div>

          <div class="form-group flex-1">
            <label>Telefone:</label>
            <div class="input-wrapper">
              <input type="tel" id="fieldTelefone" placeholder="(00) 00000-0000" />
            </div>
          </div>
        </div>

        <div class="row-group">
          <div class="form-group flex-1">
            <label>Idade:</label>
            <div class="input-wrapper">
              <input type="number" id="fieldAge" placeholder="Ex: 30" />
            </div>
          </div>

          <div class="form-group flex-1">
            <label>Gênero:</label>
            <div class="input-wrapper">
              <select id="fieldGender" class="edit-select">
                <option value="" disabled selected>Selecione...</option>
                <option value="M">Masculino</option>
                <option value="F">Feminino</option>
                <option value="O">Outro</option>
              </select>
            </div>
          </div>
        </div>

        <div class="row-group">
          <div class="form-group flex-1">
            <label>Peso (kg):</label>
            <div class="input-wrapper">
              <input type="number" id="fieldWeight" step="0.1" placeholder="Ex: 75.5" />
            </div>
          </div>

          <div class="form-group flex-1">
            <label>Altura (cm):</label>
            <div class="input-wrapper">
              <input type="number" id="fieldHeight" placeholder="Ex: 175" />
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>E-mail (Login):</label>
          <div class="input-wrapper">
            <input type="text" id="fieldEmail" placeholder="Insira seu Login" />
            <button type="button" id="btnGerarLogin" class="btn-gerar-inline">GERAR</button>
          </div>
        </div>

        <div class="form-group">
          <label>Nova Senha:</label>
          <div class="input-wrapper">
            <input type="password" id="fieldSenha" placeholder="Deixe em branco para manter" />
            <button type="button" id="btnGerarSenha" class="btn-gerar-inline">GERAR</button>
            <i class="fa-solid fa-eye-slash input-icon" id="toggleSenha"
              style="cursor: pointer; color: #9ca3af; font-size: 16px;"></i>
          </div>
        </div>

        <div class="form-group">
          <label>CEP:</label>
          <div class="input-wrapper">
            <input type="text" id="fieldCep" placeholder="00000-000" maxlength="9" />
          </div>
        </div>

        <div class="form-group">
          <label>Cidade / Estado:</label>
          <div class="input-wrapper input-row-wrapper">
            <input type="text" id="fieldCidade" class="input-flex-fill" placeholder="Cidade" />
            <span style="color: #9ca3af;">/</span>
            <input type="text" id="fieldEstado" class="input-flex-small" placeholder="UF" maxlength="2" />
          </div>
        </div>

        <div class="form-group">
          <label>Bairro:</label>
          <div class="input-wrapper">
            <input type="text" id="fieldBairro" placeholder="Ex: nacoes" />
          </div>
        </div>

        <div class="form-group">
          <label>Endereço / Logradouro:</label>
          <div class="input-wrapper">
            <input type="text" id="fieldEndereco" placeholder="Ex: Rua das Flores, 123" />
          </div>
        </div>

        <button type="submit" class="btn-submit" id="btnSave" style="margin-top: 24px;">SALVAR ALTERAÇÕES</button>
      </form>
    </div>

  </div>
</body>

</html>
