<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criar Rotina de Treino - Pro Fisio</title>

    <link rel="stylesheet" href="/style/adm/cadastro_adm.css" />
    <link rel="stylesheet" href="/style/adm/cadastro_rotina.css" />
    <script src="/script/authGuard.js"></script>
    <script>verificarAcesso("ADMIN");</script>
    <script src="/script/adm/cadastro_rotina.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
    <div class="app-wrapper">
        <header class="page-header">
            <button onclick="back()" class="btn-back" aria-label="Voltar">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <h1>CRIAR ROTINA</h1>
            <p class="subtitle">
                Crie um modelo de treinamento agrupando exercícios
            </p>
        </header>

        <form>
            <div class="form-group">
                <label for="nome">Nome da Rotina</label>
                <div class="input-wrapper">
                    <input type="text" id="nome" placeholder="Ex: Recuperação de Joelho" />
                    <i class="fa-solid fa-notes-medical input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="descricao">Objetivo (Opcional)</label>
                <div class="input-wrapper">
                    <input type="text" id="descricao" placeholder="Ex: Foco no fortalecimento muscular" />
                    <i class="fa-solid fa-align-left input-icon"></i>
                </div>
            </div>

            <div class="exercises-section">
                <h3>Selecione Exercícios e Configure Descanso</h3>
                
                <div class="search-filter-container">
                    <div class="search-box">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="searchExercise" placeholder="Pesquisar exercício pelo nome..." />
                    </div>
                    <div class="category-filters" id="categoryFilters">
                        <span class="category-chip active" data-category="all">Todos</span>
                        <!-- Categorias dinâmicas aqui -->
                    </div>
                </div>

                <div class="exercises-list" id="exercisesList">
                    <!-- Preenchido via JS -->
                </div>
            </div>

            <button type="submit" class="btn-submit" id="btn-cadastrar" style="margin-top: 24px;">CRIAR ROTINA</button>
        </form>
    </div>
</body>

</html>
