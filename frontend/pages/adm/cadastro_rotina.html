<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criar Rotina de Treino - PRO FISIO SIMIONATO</title>
    <link rel="icon" type="image/png" href="/images/icon-192.png">

    <link rel="stylesheet" href="/style/adm/cadastro_adm.css" />
    <link rel="stylesheet" href="/style/adm/cadastro_rotina.css" />
    <script src="/script/authGuard.js"></script>
    <script>verificarAcesso("ADMIN");</script>
    <script src="/script/components.js" defer></script>
    <script src="/script/adm/cadastro_rotina.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        /* Override agressivo para PWA - Evita estado preso */

        #scrollToBottomBtn {
            background-color: #5b8af5 !important;
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0) !important; /* Remove o pisca azul no Android */
            user-select: none !important;
            -webkit-user-drag: none;
            touch-action: manipulation;
        }
        /* Hover real - NUNCA acionado no toque de tela do celular */
        @media (hover: hover) and (pointer: fine) {
            #scrollToBottomBtn:hover {
                background-color: #1a1a2e !important;
                transform: translateY(-5px);
            }
        }
        #scrollToBottomBtn:active, 
        #scrollToBottomBtn:focus,
        #scrollToBottomBtn:focus-visible {
            background-color: #5b8af5 !important;
            outline: none !important;
            box-shadow: 0 4px 15px rgba(91, 138, 245, 0.4) !important;
        }
        #scrollToBottomBtn i {
            pointer-events: none;
        }
    </style>
</head>



<body>
    <div class="app-wrapper">
        <header class="page-header">
            <button onclick="back()" class="btn-back" aria-label="Voltar">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <h1>CRIAR ROTINA</h1>
            <p class="subtitle">
                Crie um modelo de treinamento agrupando exercícios
            </p>
        </header>

        <form>
            <div class="form-group">
                <label for="nome">Nome da Rotina</label>
                <div class="input-wrapper">
                    <input type="text" id="nome" placeholder="Ex: Recuperação de Joelho" />
                    <i class="fa-solid fa-notes-medical input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="descricao">Objetivo (Opcional)</label>
                <div class="input-wrapper">
                    <input type="text" id="descricao" placeholder="Ex: Foco no fortalecimento muscular" />
                    <i class="fa-solid fa-align-left input-icon"></i>
                </div>
            </div>

            <div class="exercises-section">
                <h3>Selecione Exercícios e Configure Descanso</h3>
                
                <div class="search-filter-container">
                    <div class="search-box">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="searchExercise" placeholder="Pesquisar exercício pelo nome..." />
                    </div>
                    <div class="category-filters" id="categoryFilters">
                        <span class="category-chip active" data-category="all">Todos</span>
                        <!-- Categorias dinâmicas aqui -->
                    </div>
                </div>

                <div class="exercises-list" id="exercisesList">
                    <!-- Preenchido via JS -->
                </div>
            </div>

            <button type="submit" class="btn-submit" id="btn-cadastrar" style="margin-top: 24px;">CRIAR ROTINA</button>
        </form>
    </div>

    <!-- Botão Flutuante para Navegação -->
    <button id="scrollToBottomBtn" class="btn-floating-bottom" onclick="toggleScroll()" title="Rolar">
        <i class="fa-solid fa-chevron-down"></i>
    </button>

    <script>
        function toggleScroll() {
            const btn = document.getElementById('scrollToBottomBtn');
            // Pequeno atraso para garantir que o navegador termine o ciclo de toque
            setTimeout(() => btn.blur(), 50);

            const isBottom = (window.innerHeight + window.scrollY) >= (document.documentElement.scrollHeight - 100);
            if (isBottom) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'smooth' });
            }
        }


        window.addEventListener('scroll', () => {
            const btn = document.getElementById('scrollToBottomBtn');
            const isBottom = (window.innerHeight + window.scrollY) >= (document.documentElement.scrollHeight - 100);
            if (isBottom) {
                btn.classList.add('is-up');
            } else {
                btn.classList.remove('is-up');
            }
        });
    </script>
</body>


</html>
