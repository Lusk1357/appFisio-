<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendário - Pro Fisio</title>

  <link rel="stylesheet" href="/style/adm/calendario.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="/script/authGuard.js"></script>
  <script>verificarAcesso("ADMIN");</script>
  <script src="/script/adm/calendario.js" defer></script>
</head>

<body>
  <div class="app-container">

    <!-- Header -->
    <header class="page-header">
      <button class="btn-back" onclick="history.back()">
        <i class="fa-solid fa-chevron-left"></i>
      </button>
    </header>

    <!-- Avatar + Nome -->
    <section class="profile-hero">
      <div class="avatar-wrapper">
        <div class="avatar-placeholder" id="avatarDisplay">
          <i class="fa-solid fa-user"></i>
        </div>
      </div>
      <h1 class="patient-name" id="patientName">—</h1>
    </section>

    <!-- Calendário -->
    <section class="calendar-section">

      <!-- Navegação mês/ano -->
      <div class="calendar-nav">
        <button class="nav-btn" id="btnPrevMonth">
          <i class="fa-solid fa-chevron-left"></i>
        </button>
        <div class="month-year">
          <span class="month-label" id="monthLabel">—</span>
          <span class="year-label" id="yearLabel">—</span>
        </div>
        <button class="nav-btn" id="btnNextMonth">
          <i class="fa-solid fa-chevron-right"></i>
        </button>
      </div>

      <!-- Cabeçalho dias da semana -->
      <div class="weekdays-header">
        <span>Seg</span>
        <span>Ter</span>
        <span>Qua</span>
        <span>Qui</span>
        <span>Sex</span>
        <span>Sab</span>
        <span>Dom</span>
      </div>

      <!-- Grid de dias -->
      <div class="days-grid" id="daysGrid">
        <!-- Preenchido via JS -->
      </div>

    </section>

    <!-- Botão salvar (fixo no rodapé) -->
    <footer class="bottom-bar">
      <button class="btn-save" id="btnSave">SALVAR</button>
    </footer>

  </div>
</body>

</html>
