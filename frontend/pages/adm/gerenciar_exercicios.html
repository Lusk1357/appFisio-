<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciar Exercícios - PRO FISIO SIMIONATO</title>

    <link rel="stylesheet" href="/style/adm/gerenciar_exercicios.css" />
    <!-- PWA Setup -->
    <link rel="icon" type="image/png" href="/images/icon-192.png">
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script src="/script/authGuard.js"></script>
    <script>verificarAcesso("ADMIN");</script>
    <script src="/script/components.js" defer></script>
    <script src="/script/adm/gerenciar_exercicios.js" defer></script>
    <style>
        /* Botão Flutuante */
        .btn-floating-bottom {
            position: fixed;
            bottom: 30px;
            right: 24px;
            width: 56px;
            height: 56px;
            background-color: #5b8af5 !important;
            color: #fff !important;
            border: none;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(91, 138, 245, 0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            z-index: 2000;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
            border: 2px solid rgba(255, 255, 255, 0.2);
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0) !important;
            user-select: none !important;
            outline: none !important;
            touch-action: manipulation;
        }

        @media (hover: hover) and (pointer: fine) {
            .btn-floating-bottom:hover {
                background-color: #1a1a2e !important;
                transform: translateY(-5px);
                box-shadow: 0 8px 25px rgba(26, 26, 46, 0.3);
            }
        }

        /* Garante que em touch o botão NUNCA mude de cor no foco ou hover */
        @media (hover: none) {
            .btn-floating-bottom:hover,
            .btn-floating-bottom:active,
            .btn-floating-bottom:focus {
                background-color: #5b8af5 !important;
            }
        }

        .btn-floating-bottom:focus,
        .btn-floating-bottom:focus-visible {
            outline: none !important;
            background-color: #5b8af5 !important;
        }

        .btn-floating-bottom:active {
            transform: scale(0.92);
            transition: transform 0.05s;
        }

        .btn-floating-bottom i {
            filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.1));
            transition: transform 0.4s ease;
            pointer-events: none;
        }

        .btn-floating-bottom.is-up i {
            transform: rotate(180deg);
        }
    </style>
</head>


<body>

    <div class="app-wrapper">

        <!-- Header -->
        <header class="page-header">
            <button class="btn-back" onclick="history.back()">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <span class="header-title">Gerenciar Exercícios</span>
            <button class="btn-back" onclick="window.location.href='/admin'" title="Página Inicial">
                <i class="fa-solid fa-house"></i>
            </button>
        </header>

        <!-- Título + controles -->
        <div class="section-top">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;">
                <h1 class="section-title" style="margin-bottom: 0;">EXERCÍCIOS</h1>
                <button class="btn-primary-small" onclick="window.location.href='/admin/exercicios/novo'">
                    <i class="fa-solid fa-plus"></i> Novo
                </button>
            </div>

            <!-- Barra de busca -->
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="searchInput" placeholder="Buscar exercício..." />
            </div>

            <!-- Filtros por Categoria -->
            <div class="category-filters" id="categoryFilters">
                <span class="category-chip active" data-category="all">Todos</span>
            </div>

            <div class="filter-bar">
                <span class="filter-label">Ordenar por:</span>
                <div class="filter-pills" id="filterPills">
                    <button class="pill active" data-sort="az">A–Z</button>
                    <button class="pill" data-sort="za">Z–A</button>
                    <button class="pill" data-sort="type">Categoria</button>
                </div>
            </div>
        </div>

        <!-- Lista de exercícios -->
        <main class="exercises-list" id="exercisesList">
            <!-- Preenchida via JS -->
        </main>

        <!-- Estado vazio -->
        <div class="empty-state" id="emptyState" style="display:none">
            <i class="fa-solid fa-dumbbell"></i>
            <p>Nenhum exercício cadastrado ainda.</p>
        </div>

    </div>

    <!-- ═══════════════════════════════
         MODAL DE EDIÇÃO
    ═══════════════════════════════════ -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Editar Exercício</h2>
                <button class="modal-close-btn" id="closeEditModal">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <form id="editForm">
                <input type="hidden" id="editId" />
                <div class="form-group">
                    <label for="editNome">Nome do Exercício</label>
                    <div class="input-wrapper">
                        <input type="text" id="editNome" placeholder="Nome do exercício" />
                        <i class="fa-solid fa-dumbbell input-icon"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label for="editCategoria">Categoria</label>
                    <div class="input-wrapper">
                        <select id="editCategoria">
                            <option value="" disabled>Selecione a categoria...</option>
                            <option value="Cervical / Pescoço">Cervical / Pescoço</option>
                            <option value="Ombro / Braço">Ombro / Braço</option>
                            <option value="Cotovelo / Antebraço">Cotovelo / Antebraço</option>
                            <option value="Punho / Mão">Punho / Mão</option>
                            <option value="Coluna Lombar">Coluna Lombar</option>
                            <option value="Coluna Torácica">Coluna Torácica</option>
                            <option value="Core / Abdômen">Core / Abdômen</option>
                            <option value="Quadril / Coxa">Quadril / Coxa</option>
                            <option value="Joelho / Perna">Joelho / Perna</option>
                            <option value="Tornozelo / Pé">Tornozelo / Pé</option>
                            <option value="Respiratório">Respiratório</option>
                            <option value="Geral / Funcional">Geral / Funcional</option>
                        </select>
                        <i class="fa-solid fa-tag input-icon"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label for="editDuration">Duração Estimada (Minutos)</label>
                    <div class="input-wrapper">
                        <input type="number" id="editDuration" placeholder="Ex: 5" min="0" />
                        <i class="fa-solid fa-clock input-icon"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label for="editComoExecutar">Como Executar</label>
                    <div class="input-wrapper">
                        <textarea id="editComoExecutar" rows="4" placeholder="Descreva o passo a passo..."></textarea>
                        <i class="fa-solid fa-clipboard-list input-icon" style="top:14px;"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label for="editEquipamentos">Equipamentos (Opcional)</label>
                    <div class="input-wrapper">
                        <input type="text" id="editEquipamentos" placeholder="Ex: Halteres, Faixa Elástica" />
                        <i class="fa-solid fa-box-open input-icon"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label for="editObservacao">Observação (Opcional)</label>
                    <div class="input-wrapper">
                        <input type="text" id="editObservacao" placeholder="Observação..." />
                        <i class="fa-solid fa-comment-medical input-icon"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>Imagem do Exercício (Opcional)</label>
                    <div class="image-mode-toggle">
                        <button type="button" class="toggle-btn active" data-mode="local" id="editBtnModoLocal">
                            <i class="fa-solid fa-folder-open"></i> Imagem Local
                        </button>
                        <button type="button" class="toggle-btn" data-mode="url" id="editBtnModoUrl">
                            <i class="fa-solid fa-link"></i> URL Externa
                        </button>
                    </div>
                    <!-- Modo Local -->
                    <div class="input-wrapper" id="editImagemLocalWrapper">
                        <select id="editImagemLocalSelect">
                            <option value="" disabled selected>Carregando imagens...</option>
                        </select>
                        <i class="fa-solid fa-image input-icon"></i>
                    </div>
                    <!-- Modo URL -->
                    <div class="input-wrapper" id="editImagemUrlWrapper" style="display:none;">
                        <input type="text" id="editImageUrl" placeholder="Ex: https://exemplo.com/imagem.png" />
                        <i class="fa-solid fa-link input-icon"></i>
                    </div>
                    <!-- Preview -->
                    <div id="editImagePreview" style="margin-top:8px; display:none; text-align:center;">
                        <img id="editImgTag" src="" alt="Prévia" style="max-height:80px; border-radius:10px; border:1px solid #e2e8f0;" />
                    </div>
                </div>
                <div class="form-group">
                    <label for="editVideoLink">Link do Vídeo (Opcional)</label>
                    <div class="input-wrapper">
                        <input type="url" id="editVideoLink" placeholder="https://..." />
                        <i class="fa-solid fa-video input-icon"></i>
                    </div>
                </div>
                <button type="submit" class="btn-save" id="btnSaveEdit">
                    <i class="fa-solid fa-check"></i> SALVAR ALTERAÇÕES
                </button>
            </form>
        </div>
    </div>

    <!-- ═══════════════════════════════
         MODAL DE CONFIRMAÇÃO DE EXCLUSÃO
    ═══════════════════════════════════ -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal-content modal-delete">
            <div class="delete-icon-circle">
                <i class="fa-solid fa-trash-can"></i>
            </div>
            <h2>Excluir Exercício?</h2>
            <p class="delete-msg" id="deleteMsg">Tem certeza que deseja excluir este exercício? Esta ação não pode ser desfeita.</p>
            <div class="delete-actions">
                <button class="btn-cancel" id="cancelDelete">Cancelar</button>
                <button class="btn-confirm-delete" id="confirmDelete">
                    <i class="fa-solid fa-trash-can"></i> Excluir
                </button>
            </div>
        </div>
    </div>

    <!-- Botão Flutuante -->
    <button id="scrollToBottomBtn" class="btn-floating-bottom" onclick="toggleScroll()" aria-label="Rolar para baixo">
        <i class="fas fa-chevron-down"></i>
    </button>

    <script>
        function toggleScroll() {
            const btn = document.getElementById('scrollToBottomBtn');
            setTimeout(() => btn.blur(), 50);

            const isBottom = (window.innerHeight + window.scrollY) >= (document.documentElement.scrollHeight - 100);
            if (isBottom) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'smooth' });
            }
        }

        window.addEventListener('scroll', () => {
            const btn = document.getElementById('scrollToBottomBtn');
            const isBottom = (window.innerHeight + window.scrollY) >= (document.documentElement.scrollHeight - 100);
            
            if (isBottom) {
                btn.classList.add('is-up');
            } else {
                btn.classList.remove('is-up');
            }
        });
    </script>
</body>


</html>
