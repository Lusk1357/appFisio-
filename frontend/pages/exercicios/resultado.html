<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resultado - PRO FISIO SIMIONATO</title>
  <!-- PWA Setup -->
  <link rel="icon" type="image/png" href="/images/icon-192.png">
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/style/exercicios/resultado.css" />
  <script src="/script/exercicios/resultado.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
  <!-- Overlay Dark Blue Background -->
  <div class="completion-overlay">
    <div class="completion-card">
      <div class="completion-medal"><i class="fa-solid fa-medal"></i></div>
      <h2 class="completion-title">TREINO CONCLUÍDO!</h2>
      
      <div class="completion-stats">
        <div class="stat-item">
          <span class="stat-icon"><i class="fa-solid fa-dumbbell"></i></span>
          <span class="stat-value" id="statExercicios">0</span>
          <span class="stat-label">exercícios</span>
        </div>
        <div class="stat-item">
          <span class="stat-icon"><i class="fa-solid fa-clock"></i></span>
          <span class="stat-value" id="statTempo">00:00</span>
          <span class="stat-label">tempo total</span>
        </div>
      </div>

      <!-- Mantemos um fallback do statCalorias oculto só para o script não quebrar se quiser ler -->
      <span id="statCalorias" style="display:none;"></span>
      <span id="completionDate" style="display:none;"></span>
      <span id="workoutStep" style="display:none;"></span>
      <button id="backBtn" style="display:none;"></button>

      <!-- Lista de exercícios feitos (vazia no mock, populada seria o ideal, mas simularemos a aparência) -->
      <ul class="completion-list" id="completionList">
        <li><i class="fa-solid fa-circle-check"></i> Treino Finalizado</li>
      </ul>

      <button class="btn-finish" id="saveBtn">
        <i class="fa-solid fa-house"></i> Voltar ao início
      </button>
    </div>
  </div>
</body>

</html>
