<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalhes do Exercício - Pro Fisio</title>

  <link rel="stylesheet" href="/style/exercicios/detalhes_exercicios.css" />
  <script src="/script/exercicios/detalhes_exercicios.js" defer></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap"
    rel="stylesheet" />
  <!-- PWA Setup -->
  <link rel="icon" type="image/png" href="/images/icon-192.png">
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
  <div class="app-container">
    <div class="detail-card">
      <header class="image-header">
        <button class="back-btn" id="backBtn" aria-label="Voltar">
          <i class="fa-solid fa-chevron-left"></i>
        </button>
        <img
          src="https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
          alt="Mulher alongando" class="header-img" />
      </header>

      <main class="content-body">
        <div class="info-bar">
          <div class="info-item">
            <i class="fa-solid fa-droplet icon-droplet"></i>
            <span>Fisioterapia</span>
          </div>
          <div class="info-divider"></div>
          <div class="info-item">
            <i class="fa-regular fa-clock"></i>
            <span>35 min</span>
          </div>
        </div>

        <div class="text-section">
          <h1 class="exercise-title">EXERCÍCIO DE FISIOTERAPIA</h1>
          <p class="exercise-desc">
            Siga os exercícios indicados pelo seu fisioterapeuta para
            fortalecer o joelho, melhorar a mobilidade e aliviar dores. Faça
            os movimentos com calma, respeite seus limites e acompanhe sua
            evolução pelo app.
          </p>
        </div>

        <footer class="bottom-action-bar">
          <span class="action-text">3 Semanas - 20 Exercícios</span>
          <button class="btn-start" id="startBtn">Iniciar</button>
        </footer>
      </main>
    </div>
  </div>
</body>

</html>
