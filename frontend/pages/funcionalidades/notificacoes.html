<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notificações - Pro Fisio</title>

  <link rel="stylesheet" href="/style/funcionalidades/notificacoes.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
  <div class="app-container">

    <header class="top-bar">
      <div class="top-bar-content">
        <button class="icon-btn" onclick="history.back()" aria-label="Voltar">
          <i class="fa-solid fa-chevron-left"></i>
        </button>

        <h1>NOTIFICAÇÕES</h1>

        <div style="width: 24px;"></div>
      </div>
    </header>

    <main class="main-content">

      <div class="notifications-container" id="notificationsContainer">
        <!-- Renderizado dinamicamente via JS -->
        <p style="text-align: center; color: #9ca3af; margin-top: 40px; font-size: 14px;" id="emptyNotifications">
          Nenhuma conquista ganhada recentemente.
        </p>
      </div>

    </main>

  </div>
  <script src="/script/funcionalidades/notificacoes.js"></script>
</body>

</html>
