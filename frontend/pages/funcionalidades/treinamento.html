<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Treinamentos - Pro Fisio</title>

  <link rel="stylesheet" href="/style/funcionalidades/home.css">
  <link rel="stylesheet" href="/style/funcionalidades/treinamento.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap"
    rel="stylesheet">
  <!-- PWA Setup -->
  <link rel="icon" type="image/png" href="/images/icon-192.png">
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="/script/authGuard.js"></script>
  <script>verificarAcesso("PATIENT");</script>
  <script src="/script/components.js"></script>
  <script src="/script/funcionalidades/treinamento.js?v=2.2" defer></script>
</head>

<body>
  <div class="app-container">

    <!-- Top Nav / Cabeçalho limpo -->
    <div class="header-bg compact-header">
      <div class="top-nav">
        <div class="menu-left">
          <button class="btn-back" onclick="window.location.href='/pages/funcionalidades/home.html'">
            <i class="fa-solid fa-chevron-left" style="color: #fff; font-size: 20px;"></i>
          </button>
        </div>
        <h2 class="page-title">MEUS TREINOS</h2>
        <i class="fa-regular fa-bell bell-icon" style="opacity: 0;"></i> <!-- Espaçador invisível -->
      </div>

      <!-- Navegador de Meses Simplificado -->
      <div class="month-nav">
        <button id="btnPrevMonth"><i class="fa-solid fa-chevron-left"></i></button>
        <span id="currentMonthYear">—</span>
        <button id="btnNextMonth"><i class="fa-solid fa-chevron-right"></i></button>
      </div>
    </div>

    <div class="main-content">

      <div class="week-slider" id="weekSlider">
        <!-- Renderizado no JS -->
      </div>

      <h3 class="section-subtitle" id="selectedDateLabel">Hoje</h3>

      <div id="startTrainingArea" style="padding: 0 20px 10px;"></div>

      <div class="exercises-list" id="exercisesList">
        <!-- Renderizado no JS -->
        <p class="empty-msg">Selecione uma data para ver seus treinos.</p>
      </div>

    </div>

    <!-- Bottom Navigation Componentized -->
  </div>
</body>

</html>
