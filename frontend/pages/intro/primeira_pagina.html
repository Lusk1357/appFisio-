<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />

  <title>PRO FISIO SIMIONATO</title>
  <link rel="stylesheet" href="/style/intro/primeira_pagina.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,400;500&display=swap"
    rel="stylesheet" />
  <script src="/script/intro/primeira_pagina.js"></script>

  <!-- PWA Setup -->
  <link rel="icon" type="image/png" href="/images/icon-192.png">
  <link rel="manifest" href="/manifest.json" />
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW reg:', reg.scope))
          .catch(err => console.log('SW fail:', err));
      });
    }
  </script>
</head>

<body>
  <div class="mobile-container">
    <div id="blurLeft" class="blur-blob"></div>
    <div id="blurRight" class="blur-blob"></div>

    <div class="content">
      <div class="image">
        <div class="circle-background"></div>
        <img class="doctor-img" src="/images/doctor.png" alt="Foto do Doutor" />
      </div>

      <h1 class="logo-p">PRO <span>FISIO</span> SIMIONATO</h1>

      <p class="subtitle">Sua recuperação começa aqui!</p>

      <button onclick="ref()" class="start">
        <p>COMEÇAR AGORA</p>
      </button>
    </div>
  </div>
</body>

</html>
