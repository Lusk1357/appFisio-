<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alterar Senha - Pro Fisio</title>

  <link rel="stylesheet" href="/style/auth/alterar_senha.css" />
  <script src="/script/auth/alterar_senha.js" defer></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
  <div class="app-container">
    <header class="top-bar">
      <div class="top-bar-content">
        <button class="icon-btn" id="backBtn" aria-label="Voltar">
          <i class="fa-solid fa-chevron-left"></i>
        </button>
        <h1>ALTERAR SENHA</h1>
        <div style="width: 24px"></div>
      </div>
    </header>

    <main class="main-content">
      <div class="form-card">
        <p class="form-subtitle">
          Sua nova senha deve ser diferente das senhas usadas anteriormente.
        </p>

        <form id="changePasswordForm">
          <div class="form-group">
            <label>Senha Atual</label>
            <div class="input-wrapper">
              <input type="password" id="currentPassword" placeholder="Digite a senha atual" />
              <i class="fa-solid fa-eye-slash toggle-password" data-target="currentPassword"></i>
            </div>
          </div>

          <div class="form-group">
            <label>Nova Senha</label>
            <div class="input-wrapper">
              <input type="password" id="newPassword" placeholder="Digite a nova senha" />
              <i class="fa-solid fa-eye-slash toggle-password" data-target="newPassword"></i>
            </div>
          </div>

          <div class="form-group">
            <label>Confirmar Nova Senha</label>
            <div class="input-wrapper">
              <input type="password" id="confirmPassword" placeholder="Confirme a nova senha" />
              <i class="fa-solid fa-eye-slash toggle-password" data-target="confirmPassword"></i>
            </div>
          </div>

          <button type="submit" class="btn-save">REDEFINIR SENHA</button>
        </form>
      </div>
    </main>
  </div>
</body>

</html>
