<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Pro Fisio</title>

  <link rel="stylesheet" href="/style/auth/login.css" />
  <script src="/script/auth/login.js" defer></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <!-- PWA Setup -->
  <link rel="icon" type="image/png" href="/images/icon-192.png">
  <link rel="manifest" href="/manifest.json" />
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</head>

<body>
  <div class="app-container">
    <div class="header">
      <h1>BEM-VINDO AO PRO <span class="highlight-blue">FISIO</span>!</h1>
      <p class="subtitle">Olá, faça login para continuar!</p>
    </div>

    <form>
      <div class="form-group">
        <label for="email">Login</label>
        <div class="input-wrapper">
          <input type="text" id="email" placeholder="Insira seu Login" />
          <i class="fa-solid fa-check input-icon"></i>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="Insira sua senha" />
          <i class="fa-solid fa-eye-slash input-icon" id="togglePassword" style="cursor: pointer;"></i>
        </div>
      </div>

      <a href="/pages/auth/esqueci_a_senha.html" class="forgot-password">Esqueceu a senha?</a>

      <button type="submit" class="btn-login">LOGIN</button>
    </form>


  </div>
</body>

</html>
