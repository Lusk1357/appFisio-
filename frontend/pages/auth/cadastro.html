<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro - PRO FISIO SIMIONATO</title>

  <link rel="stylesheet" href="/style/auth/cadastro.css" />
  <script src="/script/auth/cadastro.js" defer></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap"
    rel="stylesheet" />
  <!-- PWA Setup -->
  <link rel="icon" type="image/png" href="/images/icon-192.png">
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
  <div class="app-container">
    <div class="header">
      <button onclick="back()" class="back-btn" aria-label="Voltar">
        <i class="fa-solid fa-chevron-left"></i>
      </button>
      <h1>CRIAR CONTA</h1>
      <p class="subtitle">
        Por favor, insira suas credenciais para continuar
      </p>
    </div>

    <form>
      <div class="form-group">
        <label for="name">Nome Completo</label>
        <div class="input-wrapper">
          <input type="text" id="name" placeholder="Insira seu nome completo" />
          <i class="fa-solid fa-check input-icon"></i>
        </div>
      </div>

      <div class="form-group">
        <label for="tel">Telefone</label>
        <div class="input-wrapper">
          <input type="tel" id="tel" placeholder="Insira seu número de celular" />
          <i class="fa-solid fa-phone input-icon"></i>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Endereço de e-mail</label>
        <div class="input-wrapper">
          <input type="email" id="email" placeholder="Insira seu e-mail" />
          <i class="fa-solid fa-envelope input-icon"></i>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="Insira sua senha" />
          <i class="fa-solid fa-eye-slash input-icon"></i>
        </div>
      </div>

      <button type="submit" class="btn-login">CRIAR CONTA</button>
    </form>

    <div class="divider">Ou cadastre-se com</div>

    <div class="social-section">
      <button class="social-btn btn-google">
        <i class="fa-brands fa-google" style="color: #db4437"></i>
        Conectar com o Google
      </button>

      <button class="social-btn btn-facebook">
        <i class="fa-brands fa-facebook-f"></i>
        Conectar com o Facebook
      </button>
    </div>

    <div class="footer-link">
      Já tem uma conta? <a href="/login">Faça login!</a>
    </div>
  </div>
</body>

</html>
